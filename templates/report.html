<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIPER Scan Report</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .domain-item {
            margin: 15px 0;
            padding: 15px;
            background-color: #f8f9fa;
            border-left: 4px solid #3498db;
            border-radius: 4px;
        }
        .domain-url {
            color: #2c3e50;
            font-weight: bold;
            font-size: 1.1em;
        }
        .domain-tech {
            color: #7f8c8d;
            margin-top: 5px;
            font-size: 0.9em;
        }
        .status-code {
            float: right;
            padding: 3px 8px;
            border-radius: 3px;
            color: white;
            background-color: #27ae60;
        }
        .status-code.error {
            background-color: #e74c3c;
        }
        .metadata {
            color: #95a5a6;
            font-size: 0.8em;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VIPER Scan Report</h1>
        <div class="domains-list">
            {% for domain in domains %}
            <div class="domain-item">
                <span class="status-code {% if domain.status_code >= 400 %}error{% endif %}">
                    {{ domain.status_code }}
                </span>
                <div class="domain-url">{{ domain.url }}</div>
                {% if domain.technologies %}
                <div class="domain-tech">
                    Technologies: {{ domain.technologies|join(', ') }}
                </div>
                {% endif %}
            </div>
            {% endfor %}
        </div>
        <div class="metadata">
            Generated by VIPER v{{ version }} on {{ timestamp }}
        </div>
    </div>
</body>
</html>
